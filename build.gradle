import net.darkhax.curseforgegradle.TaskPublishCurseForge

buildscript {
    repositories {
        // These repositories are only for Gradle plugins, put any other repositories in the repository block further below
        maven { url = 'https://repo.spongepowered.org/repository/maven-public/' }
        mavenCentral()
    }
    dependencies {
        classpath 'org.spongepowered:mixingradle:0.7-SNAPSHOT'
    }
}

plugins {
    id 'eclipse'
    id 'idea'
    id 'net.minecraftforge.gradle' version '[6.0.16,6.2)'
    id 'org.parchmentmc.librarian.forgegradle' version '1.+'
    id "com.modrinth.minotaur" version "2.+"
    id 'net.darkhax.curseforgegradle' version '1.1.25'
}

modrinth {
    token = System.getenv("MODRINTH_TOKEN") // Remember to have the MODRINTH_TOKEN environment variable set or else this will fail - just make sure it stays private!
    projectId = "justleveling-fork" // This can be the project ID or the slug. Either will work!
    versionNumber = "${project.addon_mod_version}" // Addon-only release version
    versionType = "release" // This is the default -- can also be `beta` or `alpha`
    uploadFile = file("${buildDir}/libs/${project.addon_mod_id}-${project.addon_mod_version}.jar")
    gameVersions = ["1.20.1"] // Must be an array, even with only one version
    loaders = ["forge"] // Must also be an array - no need to specify this if you're using Loom or ForgeGradle
    dependencies { // A special DSL for creating dependencies
        // scope.type
        // The scope can be `required`, `optional`, `incompatible`, or `embedded`
        // The type can either be `project` or `version`
        required.project "curios" // Creates a new required dependency on Fabric API
        required.project "cloth-config"

        optional.version "yacl", "3.4.2+1.20.1-forge" // Creates a new optional dependency on this specific version of Sodium
    }
}

apply plugin: 'org.spongepowered.mixin'

group = mod_group_id
version = mod_version

base {
    archivesName = mod_id
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(17)
}

def resolveBase121Jar = {
    if (project.hasProperty('base121JarPath') && project.property('base121JarPath')?.toString()?.trim()) {
        return file(project.property('base121JarPath').toString())
    }
    if (System.getenv("JLFORK_BASE121_JAR")?.trim()) {
        return file(System.getenv("JLFORK_BASE121_JAR"))
    }
    return file("C:/Users/ASROCK PRO SERIES/curseforge/minecraft/Instances/Modpack 1.20.1/mods/justlevelingfork-1.2.1.jar")
}

def resolveLegendaryTabsJar = {
    if (project.hasProperty('legendaryTabsJarPath') && project.property('legendaryTabsJarPath')?.toString()?.trim()) {
        return file(project.property('legendaryTabsJarPath').toString())
    }
    if (System.getenv("JLFORK_LEGENDARYTABS_JAR")?.trim()) {
        return file(System.getenv("JLFORK_LEGENDARYTABS_JAR"))
    }

    List<File> searchRoots = [file('run/mods'), file('mods'), file('libs')]
    List<File> candidates = []
    searchRoots.findAll { it.exists() }.each { root ->
        candidates.addAll(fileTree(root) {
            include 'LegendaryTabs-*.jar'
            include 'legendarytabs-*.jar'
            include '*legendarytabs*.jar'
        }.files.findAll { it.isFile() })
    }
    if (candidates.isEmpty()) {
        return null
    }
    return candidates.sort { a, b -> b.lastModified() <=> a.lastModified() }.first()
}

def requireLegendaryTabsJar = {
    File legendaryJar = resolveLegendaryTabsJar()
    if (legendaryJar == null || !legendaryJar.exists()) {
        throw new GradleException("LegendaryTabs jar not found for addon build. " +
                "Set -PlegendaryTabsJarPath=<path> or JLFORK_LEGENDARYTABS_JAR, " +
                "or place LegendaryTabs*.jar in run/mods, mods, or libs.")
    }
    return legendaryJar
}

sourceSets {
    main {
        resources {
            srcDir 'src/generated/resources'
        }
    }
    addon {
        java {
            srcDir 'src/addon/java'
            exclude 'com/joseetoon/justlevellingaddonjs/mixin/MixJustLevelingScreenCreateList.java'
        }
        resources {
            srcDir 'src/addon/resources'
        }
        // Addon-first: compile against the external base jar instead of local src/main outputs.
        compileClasspath += files(resolveBase121Jar()) + configurations.runtimeClasspath
        runtimeClasspath += output + configurations.runtimeClasspath
    }
}

minecraft {
    mappings channel: 'parchment', version: '2023.09.03-1.20.1'

    // This property allows configuring Gradle's ProcessResources task(s) to run on IDE output locations before launching the game.
    // It is REQUIRED to be set to true for this template to function.
    // See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
    copyIdeResources = true

    // When true, this property will add the folder name of all declared run configurations to generated IDE run configurations.
    // The folder name can be set on a run configuration using the "folderName" property.
    // By default, the folder name of a run configuration is the name of the Gradle project containing it.
    // generateRunFolders = true

    // This property enables access transformers for use in development.
    // They will be applied to the Minecraft artifact.
    // The access transformer file can be anywhere in the project.
    // However, it must be at "META-INF/accesstransformer.cfg" in the final mod jar to be loaded by Forge.
    // This default location is a best practice to automatically put the file in the right place in the final jar.
    // See https://docs.minecraftforge.net/en/latest/advanced/accesstransformers/ for more information.
    // accessTransformer = file('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        // applies to all the run configs below
        configureEach {
            workingDirectory project.file('run')

            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            property 'forge.logging.markers', 'REGISTRIES'


            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            property 'forge.logging.console.level', 'debug'
        }

        client {
            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            property 'forge.enabledGameTestNamespaces', addon_mod_id
            property 'mixin.env.remapRefMap', 'true'
            property 'mixin.env.refMapRemappingFile', "${projectDir}/build/createSrgToMcp/output.srg"
            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
                "${addon_mod_id}" {
                    source sourceSets.addon
                }
            }
        }

        server {
            property 'forge.enabledGameTestNamespaces', addon_mod_id
            args '--nogui'
            property 'mixin.env.remapRefMap', 'true'
            property 'mixin.env.refMapRemappingFile', "${projectDir}/build/createSrgToMcp/output.srg"
            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
                "${addon_mod_id}" {
                    source sourceSets.addon
                }
            }
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            property 'forge.enabledGameTestNamespaces', mod_id
            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
                "${addon_mod_id}" {
                    source sourceSets.addon
                }
            }
        }

        data {
            // example of overriding the workingDirectory set in configureEach above
            workingDirectory project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            args '--mod', mod_id, '--all', '--output', file('src/generated/resources/'), '--existing', file('src/main/resources/')
        }
    }
}

mixin {
    // Keep main mixin processing for local userdev runs.
    add sourceSets.main, "justlevelingfork.refmap.json"
    config "justlevelingfork.mixins.json"

    // Addon mixin processing.
    add sourceSets.addon, "justlevellingaddonjs.refmap.json"
    config "justlevellingaddonjs.mixins.json"
}

