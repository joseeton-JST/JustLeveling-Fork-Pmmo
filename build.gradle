                        'getDisplayNameComponentOrFallback:()Lnet/minecraft/network/chat/Component;',
                        'getDisplayNameOrFallback:()Ljava/lang/String;',
                ] as Set<String>,
                'com.seniors.justlevelingfork.registry.RegistryAptitudes'                  : [
                        'addPendingAptitude:(Ljava/lang/String;Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;)V',
                        'addPendingAptitude:(Lnet/minecraft/resources/ResourceLocation;Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;)V',
                        'getNextIndex:()I',
                        'getPendingAptitudeNames:()Ljava/util/List;',
                ] as Set<String>,
                'com.seniors.justlevelingfork.registry.RegistrySkills'                     : [
                        'addPendingSkill:(Ljava/lang/String;Lcom/seniors/justlevelingfork/registry/skills/Skill;)V',
                        'addPendingSkill:(Lnet/minecraft/resources/ResourceLocation;Lcom/seniors/justlevelingfork/registry/skills/Skill;)V',
                        'getPendingCustomSnapshot:()Ljava/util/Map;',
                ] as Set<String>,
                'com.seniors.justlevelingfork.registry.RegistryPassives'                   : [
                        'addPendingPassive:(Ljava/lang/String;Lcom/seniors/justlevelingfork/registry/passive/Passive;)V',
                        'addPendingPassive:(Lnet/minecraft/resources/ResourceLocation;Lcom/seniors/justlevelingfork/registry/passive/Passive;)V',
                        'getPendingCustomSnapshot:()Ljava/util/Map;',
                ] as Set<String>,
                'com.seniors.justlevelingfork.registry.RegistryTitles'                     : [
                        'addPendingTitle:(Ljava/lang/String;Lcom/seniors/justlevelingfork/registry/title/Title;)V',
                        'setKubeJSConditions:(Ljava/lang/String;Ljava/util/List;)V',
                        'clearKubeJSConditions:(Ljava/lang/String;)V',
                        'getKubeJSConditionsSnapshot:()Ljava/util/Map;',
                ] as Set<String>,
                'com.seniors.justlevelingfork.common.capability.AptitudeCapability'        : [
                        'isSkillUnlocked:(Lcom/seniors/justlevelingfork/registry/skills/Skill;)Z',
                        'setSkillUnlocked:(Lcom/seniors/justlevelingfork/registry/skills/Skill;Z)V',
                        'tryUnlockSkill:(Lcom/seniors/justlevelingfork/registry/skills/Skill;)Z',
                        'getAptitudeSkillPointsTotal:(Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;)I',
                        'getAptitudeSkillPointsSpent:(Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;)I',
                        'getAptitudeSkillPointsAvailable:(Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;)I',
                        'trySpendAptitudePoints:(Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;I)Z',
                        'refundAptitudePoints:(Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;I)V',
                        'respecAptitude:(Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;)V',
                ] as Set<String>,
                'com.seniors.justlevelingfork.handler.HandlerAptitude'                     : [
                        'invalidateCache:()V',
                ] as Set<String>,
                'com.seniors.justlevelingfork.network.packet.common.AptitudeLevelUpSP'     : [
                        'requiredPoints:(ILcom/seniors/justlevelingfork/registry/aptitude/Aptitude;)I',
                        'requiredExperienceLevels:(ILcom/seniors/justlevelingfork/registry/aptitude/Aptitude;)I',
                ] as Set<String>,
        ]

        Set<String> allowedMissingFields = [] as Set<String>

        Set<Map<String, String>> references = new LinkedHashSet<>()
        fileTree(classesDir).matching { include '**/*.class' }.files.each { classFile ->
            String rel = classesDir.toPath().relativize(classFile.toPath()).toString()
                    .replace('\\', '/')
                    .replace('/', '.')
            String className = rel.substring(0, rel.length() - '.class'.length())
            def dump = runCommand(['javap', '-classpath', "${classesDir.absolutePath}${File.pathSeparator}${baseJar.absolutePath}", '-v', className])
            if (dump.exit != 0) {
                throw new GradleException("javap -v failed for addon class ${className}.\n${dump.err}")
            }

            dump.out.eachLine { raw ->
                String line = raw.trim()
                if (!line.contains('// com/seniors/justlevelingfork/')) {
                    return
                }

                if (line.contains('Methodref') || line.contains('InterfaceMethodref')) {
                    def m = line =~ /\/\/ (com\/seniors\/justlevelingfork\/[\w\/$]+)\.([\w$<>]+):(\([^\)]*\).+)/
                    if (m.find()) {
                        references.add([
                                kind  : 'method',
                                owner : m.group(1).replace('/', '.'),
                                member: "${m.group(2)}:${m.group(3)}".toString(),
                        ])
                    }
                    return
                }

                if (line.contains('Fieldref')) {
                    def m = line =~ /\/\/ (com\/seniors\/justlevelingfork\/[\w\/$]+)\.([\w$]+):(.+)/
                    if (m.find()) {
                        references.add([
                                kind  : 'field',
                                owner : m.group(1).replace('/', '.'),
                                member: "${m.group(2)}:${m.group(3).trim()}".toString(),
                        ])
                    }
                }
            }
        }

        List<String> csvRows = ['kind,owner,member,status']
        List<Map<String, String>> hardMissing = []

        references.each { ref ->
            Map<String, Set<String>> abi = loadAbi(ref.owner)
            if (abi == null) {
                hardMissing.add(ref)
                csvRows.add("${ref.kind},${ref.owner},${ref.member},missing_class")
                return
            }

            if (ref.kind == 'method') {
                if (abi.methods.contains(ref.member)) {
                    return
                }

                if (allowedMissingMethods.getOrDefault(ref.owner, [] as Set<String>).contains(ref.member)) {
                    csvRows.add("${ref.kind},${ref.owner},${ref.member},allowed_missing_backport")
                    return
                }

                hardMissing.add(ref)
                csvRows.add("${ref.kind},${ref.owner},${ref.member},missing")
                return
            }

            if (ref.kind == 'field') {
                if (abi.fields.contains(ref.member)) {
                    return
                }

                if (allowedMissingFields.contains("${ref.owner}#${ref.member}")) {
                    csvRows.add("${ref.kind},${ref.owner},${ref.member},allowed_missing_backport")
                    return
                }

                hardMissing.add(ref)
                csvRows.add("${ref.kind},${ref.owner},${ref.member},missing")
            }
        }

        File report = file('build/tmp/addon_vs_base121_abi.csv')
        report.parentFile.mkdirs()
        report.text = csvRows.join('\n') + '\n'

        if (!hardMissing.isEmpty()) {
            String details = hardMissing.take(20).collect { "${it.kind} ${it.owner} ${it.member}" }.join('\n')
            throw new GradleException("ABI check failed against base 1.2.1. Missing references detected.\nSee ${report}\n${details}")
        }
    }
}

tasks.named('check').configure {
    dependsOn tasks.named('checkAddonAgainstBase121Abi')
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
// When "copyIdeResources" is enabled, this will also run before the game launches in IDE environments.
// See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [
            minecraft_version: minecraft_version, minecraft_version_range: minecraft_version_range,
            forge_version: forge_version, forge_version_range: forge_version_range,
            loader_version_range: loader_version_range,
            mod_id: mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: mod_version,
            mod_authors: mod_authors, mod_description: mod_description,
    ]

    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties + [project: project]
    }
}

tasks.named('processAddonResources', ProcessResources).configure {
    duplicatesStrategy = org.gradle.api.file.DuplicatesStrategy.EXCLUDE
    var replaceProperties = [
            addon_mod_id: addon_mod_id,
            addon_mod_name: addon_mod_name,
            addon_mod_version: addon_mod_version,
            addon_mod_authors: addon_mod_authors,
            addon_mod_description: addon_mod_description,
            addon_version: addon_mod_version,
            base_mod_version: mod_version,
    ]

    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml']) {
        expand replaceProperties + [project: project]
    }
}

// Example for how to get properties into the manifest for reading at runtime.
tasks.named('jar', Jar).configure {
    manifest {
        attributes([
                "Specification-Title": mod_id,
                "Specification-Vendor": mod_authors,
                "Specification-Version": "1", // We are version 1 of ourselves
                "Implementation-Title": project.name,
                "Implementation-Version": project.jar.archiveVersion,
                "Implementation-Vendor": mod_authors,
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }

    // This is the preferred method to reobfuscate your jar file
    finalizedBy 'reobfJar'
}

tasks.register('addonJar', Jar).configure {
    dependsOn tasks.named('addonClasses')
    archiveBaseName = addon_mod_id
    archiveVersion = addon_mod_version
    from sourceSets.addon.output
    manifest {
        attributes([
                "Specification-Title": addon_mod_id,
                "Specification-Vendor": addon_mod_authors,
                "Specification-Version": "1",
                "Implementation-Title": addon_mod_name,
                "Implementation-Version": archiveVersion,
                "Implementation-Vendor": addon_mod_authors,
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
    finalizedBy 'reobfAddonJar'
}

reobf {
    addonJar {}
}

tasks.register('buildAddonOnly') {
    group = 'build'
    description = 'Official addon-first build: checks main ownership, ABI and produces addon jar only.'
    dependsOn tasks.named('checkMainMatchesOrigin')
    dependsOn tasks.named('compileAddonJava')
    dependsOn tasks.named('checkAddonAgainstBase121Abi')
    dependsOn tasks.named('addonJar')
}

tasks.named('build').configure {
    setDependsOn([tasks.named('buildAddonOnly')])
}

tasks.matching { it.name == 'modrinth' }.configureEach {
    dependsOn tasks.named('addonJar')
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

tasks.register('publishCurseForge', TaskPublishCurseForge) {

    // This token is used to authenticate with CurseForge. It should be handled
    // with the same level of care and security as your actual password. You
    // should never share your token with an untrusted source or publish it
    // publicly to GitHub or embed it within a project. The best practice is to
    // store this token in an environment variable or a build secret.
    apiToken = System.getenv("CURSEFORGE_TOKEN")

    // Tells CurseForgeGradle to publish the output of the jar task. This will
    // return a UploadArtifact object that can be used to further configure the
    // file.
    def mainFile = upload('1073400', tasks.named('addonJar').get())
    mainFile.releaseType = "release"
    mainFile.displayName = "${project.addon_mod_name}-${project.addon_mod_version} ${project.minecraft_version}"
    mainFile.changelog = ""
    mainFile.addModLoader("Forge")
    mainFile.addGameVersion("${project.minecraft_version}")
    mainFile.addRequirement("cloth-config")
    mainFile.addRequirement("curios")
    mainFile.addRequirement("yacl")
}
