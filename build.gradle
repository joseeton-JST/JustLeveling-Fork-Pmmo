tasks.register('cleanRunBase121FromMods') {
    group = 'setup'
    description = 'Removes external justlevelingfork jars from run/mods for stable userdev runs.'
    doLast {
        File modsDir = file('run/mods')
        if (!modsDir.exists()) {
            return
        }
        fileTree(modsDir) {
            include 'justlevelingfork-*.jar'
        }.files.each { it.delete() }
    }
}

tasks.register('extractL2TabsJar', Copy) {
    dependsOn configurations.l2libraryBundle
    from({
        zipTree(configurations.l2libraryBundle.singleFile).matching {
            include "META-INF/jarjar/l2tabs-*.jar"
        }
    })
    into(layout.buildDirectory.dir("generated/l2tabs"))
    eachFile { details -> details.path = details.name }
    includeEmptyDirs = false
}

tasks.register('extractL2TabsApiClasses', Sync) {
    dependsOn tasks.named('extractL2TabsJar')
    from({
        fileTree(layout.buildDirectory.dir("generated/l2tabs")) { include "l2tabs-*.jar" }.files.collect { zipTree(it) }
    }) {
        include "dev/xkmc/l2tabs/**"
    }
    doFirst {
        def jars = fileTree(layout.buildDirectory.dir("generated/l2tabs")) { include "l2tabs-*.jar" }.files
        if (jars.isEmpty()) {
            throw new GradleException("Unable to find extracted l2tabs jar under build/generated/l2tabs")
        }
    }
    into(layout.buildDirectory.dir("generated/l2tabs-api"))
    includeEmptyDirs = false
}

tasks.named('compileJava').configure {
    dependsOn tasks.named('extractL2TabsApiClasses')
}

tasks.configureEach {
    if (name == 'runClient' || name == 'runServer') {
        dependsOn tasks.named('cleanRunBase121FromMods')
    }
}

tasks.register('runAddonClient') {
    group = 'forgegradle runs'
    description = 'Addon-first client profile in userdev (base loaded from src/main + addon from src/addon).'
    dependsOn 'runClient'
}

tasks.register('runAddonServer') {
    group = 'forgegradle runs'
    description = 'Addon-first server profile in userdev (base loaded from src/main + addon from src/addon).'
    dependsOn 'runServer'
}

def runCommand = { List<String> cmdArgs ->
    ByteArrayOutputStream stdout = new ByteArrayOutputStream()
    ByteArrayOutputStream stderr = new ByteArrayOutputStream()
    def result = exec {
        commandLine cmdArgs
        standardOutput = stdout
        errorOutput = stderr
        ignoreExitValue = true
    }
    return [
            exit: result.exitValue,
            out : stdout.toString("UTF-8"),
            err : stderr.toString("UTF-8"),
    ]
}

tasks.register('checkMainMatchesOrigin') {
    group = 'verification'
    description = 'Fails if src/main differs from origin/master (addon-first ownership guard).'
    doLast {
        def result = runCommand(['git', 'diff', '--name-only', 'origin/master', '--', 'src/main'])
        if (result.exit != 0) {
            throw new GradleException("Unable to compare src/main against origin/master.\n${result.err}")
        }

        String diff = result.out?.trim()
        if (diff) {
            throw new GradleException("src/main must stay aligned with origin/master in addon-first mode.\nChanged files:\n${diff}")
        }
    }
}

tasks.register('syncBase121ToRunMods', Copy) {
    group = 'setup'
    description = 'Copies justlevelingfork-1.2.1.jar into run/mods for addon-only run profiles.'
    from({ resolveBase121Jar() })
    into(file('run/mods'))
    rename { 'justlevelingfork-1.2.1.jar' }
    doFirst {
        File baseJar = resolveBase121Jar()
        if (!baseJar.exists()) {
            throw new GradleException("Base 1.2.1 jar not found. Set -Pbase121JarPath or JLFORK_BASE121_JAR.")
        }

        File modsDir = file('run/mods')
        modsDir.mkdirs()

        fileTree(modsDir) {
            include 'justlevelingfork-*.jar'
        }.files.each { existing ->
            if (!existing.name.equalsIgnoreCase('justlevelingfork-1.2.1.jar')) {
                existing.delete()
            }
        }
    }
}

tasks.register('snapshotBase121Abi') {
    group = 'verification'
    description = 'Generates docs/compat/base-1.2.1-abi.md from a real justlevelingfork-1.2.1.jar using javap.'
    doLast {
        File baseJar = resolveBase121Jar()
        if (!baseJar.exists()) {
            throw new GradleException("Base 1.2.1 jar not found for ABI snapshot. Set -Pbase121JarPath or JLFORK_BASE121_JAR.")
        }

        List<String> classes = [
                'com.seniors.justlevelingfork.registry.aptitude.Aptitude',
                'com.seniors.justlevelingfork.registry.skills.Skill',
                'com.seniors.justlevelingfork.registry.passive.Passive',
                'com.seniors.justlevelingfork.registry.title.Title',
                'com.seniors.justlevelingfork.common.capability.AptitudeCapability',
                'com.seniors.justlevelingfork.network.packet.common.AptitudeLevelUpSP',
                'com.seniors.justlevelingfork.handler.HandlerAptitude',
                'com.seniors.justlevelingfork.registry.RegistryAptitudes',
                'com.seniors.justlevelingfork.registry.RegistrySkills',
                'com.seniors.justlevelingfork.registry.RegistryPassives',
                'com.seniors.justlevelingfork.registry.RegistryTitles',
        ]

        File outFile = file('docs/compat/base-1.2.1-abi.md')
        outFile.parentFile.mkdirs()

        StringBuilder builder = new StringBuilder()
        builder.append("# ABI Snapshot: justlevelingfork-1.2.1\n\n")
        builder.append("Generated from: `").append(baseJar.absolutePath).append("`\n\n")
        builder.append("This file is generated by `./gradlew snapshotBase121Abi`.\n\n")

        classes.each { className ->
            def result = runCommand(['javap', '-classpath', baseJar.absolutePath, '-p', className])
            if (result.exit != 0) {
                throw new GradleException("javap failed for ${className} while generating ABI snapshot.\n${result.err}")
            }

            builder.append("## `").append(className).append("`\n\n")
            builder.append("```text\n")
            builder.append(result.out.trim()).append('\n')
            builder.append("```\n\n")
        }

        outFile.text = builder.toString()
    }
}

tasks.register('checkAddonAgainstBase121Abi') {
    group = 'verification'
    description = 'Checks addon bytecode refs against justlevelingfork-1.2.1 ABI and reports to build/tmp/addon_vs_base121_abi.csv'
    dependsOn tasks.named('compileAddonJava')
    doLast {
        File baseJar = resolveBase121Jar()
        if (!baseJar.exists()) {
            throw new GradleException("Base 1.2.1 jar not found for ABI check. Set -Pbase121JarPath or JLFORK_BASE121_JAR.")
        }

        File classesDir = sourceSets.addon.output.classesDirs.files.find { it.exists() }
        if (classesDir == null) {
            throw new GradleException("Addon classes directory not found. Run compileAddonJava first.")
        }

        Set<String> jarClassEntries = new LinkedHashSet<>()
        def jarList = runCommand(['jar', 'tf', baseJar.absolutePath])
        if (jarList.exit != 0) {
            throw new GradleException("Failed to list base jar classes.\n${jarList.err}")
        }
        jarList.out.eachLine { line ->
            if (line.endsWith('.class')) {
                jarClassEntries.add(line.trim())
            }
        }

        Map<String, Map<String, Set<String>>> abiCache = new LinkedHashMap<>()
        def loadAbi = { String owner ->
            if (abiCache.containsKey(owner)) {
                return abiCache.get(owner)
            }

            String classEntry = owner.replace('.', '/') + '.class'
            if (!jarClassEntries.contains(classEntry)) {
                abiCache.put(owner, null)
                return null
            }

            def abi = runCommand(['javap', '-classpath', baseJar.absolutePath, '-s', '-p', owner])
            if (abi.exit != 0) {
                abiCache.put(owner, null)
                return null
            }

            Set<String> methods = new LinkedHashSet<>()
            Set<String> fields = new LinkedHashSet<>()
            String currentKind = null
            String currentName = null
            String simpleName = owner.substring(owner.lastIndexOf('.') + 1)

            abi.out.eachLine { raw ->
                String line = raw.trim()
                if (line.isEmpty()) {
                    return
                }

                if (line.startsWith('descriptor:')) {
                    if (currentKind != null && currentName != null) {
                        String descriptor = line.substring('descriptor:'.length()).trim()
                        if (currentKind == 'method') {
                            methods.add("${currentName}:${descriptor}".toString())
                        } else if (currentKind == 'field') {
                            fields.add("${currentName}:${descriptor}".toString())
                        }
                    }
                    currentKind = null
                    currentName = null
                    return
                }

                if (!line.endsWith(';')) {
                    return
                }
                if (line.startsWith('public class') || line.startsWith('class ') || line.startsWith('interface ') || line == '};' || line == '}') {
                    return
                }

                if (line.contains('(')) {
                    int open = line.indexOf('(')
                    String prefix = line.substring(0, open).trim()
                    String[] parts = prefix.split(/\s+/)
                    String methodName = parts[parts.length - 1]
                    if (methodName == owner || methodName == simpleName || methodName.endsWith("." + simpleName)) {
                        methodName = '<init>'
                    }
                    currentKind = 'method'
                    currentName = methodName
                    return
                }

                String noSemicolon = line.substring(0, line.length() - 1).trim()
                String[] parts = noSemicolon.split(/\s+/)
                String fieldName = parts[parts.length - 1]
                currentKind = 'field'
                currentName = fieldName
            }

            Map<String, Set<String>> parsed = [methods: methods, fields: fields]
            abiCache.put(owner, parsed)
            return parsed
        }

        Map<String, Set<String>> allowedMissingMethods = [
                'com.seniors.justlevelingfork.registry.aptitude.Aptitude'                  : [
                        'add:(Ljava/lang/String;Ljava/lang/String;[Ljava/lang/String;)Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;',
                        'add:(Ljava/lang/String;Ljava/lang/String;I[Ljava/lang/String;)Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;',
                        'addWithId:(Ljava/lang/String;Ljava/lang/String;[Ljava/lang/String;)Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;',
                        'addWithId:(Ljava/lang/String;Ljava/lang/String;I[Ljava/lang/String;)Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;',
                        'addWithId:(Lnet/minecraft/resources/ResourceLocation;Ljava/lang/String;[Ljava/lang/String;)Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;',
                        'addWithId:(Lnet/minecraft/resources/ResourceLocation;Ljava/lang/String;I[Ljava/lang/String;)Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;',
                        'getByName:(Ljava/lang/String;)Lcom/seniors/justlevelingfork/registry/aptitude/Aptitude;',
                        'getLevelCap:()I',
                        'setLevelCap:(I)V',
                        'getBaseLevelCost:()I',
                        'setBaseLevelCost:(I)V',
                        'getSkillPointInterval:()I',
                        'setSkillPointInterval:(I)V',
                        'getLevelStaggering:()[Ljava/lang/String;',
                        'setLevelStaggering:([Ljava/lang/String;)V',
                        'getDisplayNameOrFallback:()Ljava/lang/String;',
                        'setDisplayNameOverride:(Ljava/lang/String;)V',
                        'getDisplayNameOverride:()Ljava/lang/String;',
                        'isEnabled:()Z',
                        'setEnabled:(Z)V',
                        'isHidden:()Z',
                        'setHidden:(Z)V',
